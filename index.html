<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WrenchPrice Pro | Auto Parts Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-shadow { box-shadow: 0 30px 60px -15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-hidden h-screen flex">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-72 bg-slate-900 flex flex-col transition-all duration-300 z-50">
        <div class="p-6 flex items-center gap-4 border-b border-white/10">
            <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="wrench" class="text-white w-6 h-6"></i></div>
            <span class="text-xl font-black italic uppercase text-white tracking-tighter sidebar-text">WrenchPrice</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="showView('garage')" id="nav-garage" class="w-full flex items-center gap-4 p-3 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-900/50">
                <i data-lucide="layout-dashboard"></i> <span class="font-bold text-sm uppercase tracking-widest sidebar-text">My Garage</span>
            </button>
            <button onclick="showView('search')" id="nav-search" class="w-full flex items-center gap-4 p-3 rounded-xl text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                <i data-lucide="search"></i> <span class="font-bold text-sm uppercase tracking-widest sidebar-text">Parts Finder</span>
            </button>
        </nav>
        <div class="p-6 border-t border-white/10 text-slate-500 text-[10px] uppercase font-black tracking-widest sidebar-text">
            v1.0 Pro Demo
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- HEADER -->
        <header class="bg-white p-6 shadow-sm flex justify-between items-center z-40">
            <div id="active-vehicle-indicator" class="flex items-center gap-3 bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 hidden animate-fade-in">
                <i data-lucide="car" class="w-5 h-5 text-blue-600"></i>
                <span id="header-vehicle-name" class="font-black text-sm uppercase tracking-tighter text-blue-900"></span>
            </div>
            <div id="header-placeholder" class="text-slate-400 font-bold uppercase text-xs tracking-widest">Identify Vehicle to Begin</div>
            <div class="flex items-center gap-4">
                <div class="bg-slate-100 p-2 rounded-full"><i data-lucide="bell-ring" class="w-5 h-5 text-slate-400"></i></div>
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-black text-white text-xs">WP</div>
            </div>
        </header>

        <div id="content-stage" class="flex-1 overflow-y-auto p-8 max-w-7xl mx-auto w-full">
            
            <!-- GARAGE VIEW -->
            <div id="view-garage" class="view grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in">
                <div class="lg:col-span-4">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                        <h2 class="text-2xl font-black mb-8 flex items-center gap-3 tracking-tighter uppercase italic"><i data-lucide="plus" class="bg-blue-600 text-white rounded-full p-1 w-7 h-7"></i> Add Auto</h2>
                        <div class="space-y-4">
                            <select id="select-year" onchange="updateMakes()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                                <option value="">Year</option>
                                <option>2025</option><option>2024</option><option>2023</option><option>2022</option>
                            </select>
                            <select id="select-make" onchange="updateModels()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                                <option value="">Make</option>
                            </select>
                            <select id="select-model" onchange="updateEngines()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                                <option value="">Model</option>
                            </select>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-2 flex items-center gap-1">Engine & Displacement <i data-lucide="activity" class="w-3 h-3"></i></label>
                                <select id="select-engine" class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-blue-700 border-none outline-none">
                                    <option value="">Select Engine Size</option>
                                </select>
                            </div>
                            <button onclick="addVehicle()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest mt-4 shadow-xl hover:bg-blue-700 active:scale-95 transition-all">Save to Garage</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8 space-y-6" id="garage-list">
                    <!-- Vehicles will be injected here -->
                </div>
            </div>

            <!-- SEARCH VIEW -->
            <div id="view-search" class="view hidden max-w-3xl mx-auto py-20 text-center animate-fade-in">
                <h2 class="text-6xl font-black mb-12 tracking-tighter leading-none uppercase italic text-slate-900">What needs fixed?</h2>
                <div class="relative group">
                    <input id="search-input" placeholder="Alternator, Brakes, Shocks..." class="w-full p-12 text-3xl bg-white rounded-[3.5rem] shadow-2xl border-4 border-transparent focus:border-blue-600 outline-none font-black transition-all" />
                    <button onclick="runSearch()" class="absolute right-10 top-1/2 -translate-y-1/2 bg-blue-600 text-white p-6 rounded-[2.5rem] shadow-2xl hover:scale-105 active:scale-90 transition-all">
                        <i data-lucide="search" class="w-10 h-10"></i>
                    </button>
                </div>
            </div>

            <!-- RESULTS VIEW -->
            <div id="view-results" class="view hidden space-y-10 animate-fade-in">
                <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-8 border-b border-slate-200 pb-12">
                    <div>
                        <button onclick="showView('search')" class="text-blue-600 font-black text-[10px] mb-4 flex items-center gap-2 uppercase tracking-widest hover:translate-x-[-4px] transition-transform">← RE-SCAN PARTS</button>
                        <h2 id="result-query" class="text-6xl font-black uppercase tracking-tighter leading-[0.85]">Alternator</h2>
                        <p id="result-vehicle" class="text-slate-400 font-bold text-xl uppercase italic tracking-tight mt-2"></p>
                    </div>
                    <!-- Labor Matrix -->
                    <div class="bg-white p-6 rounded-[3rem] shadow-2xl border border-slate-100 flex flex-col sm:flex-row gap-10 items-center px-10">
                        <div class="opacity-30">
                            <div class="flex items-center gap-2 text-[9px] font-black uppercase mb-1"><i data-lucide="hard-hat" class="w-3 h-3"></i> Shop Labor</div>
                            <p id="cost-shop" class="text-3xl font-black line-through italic">$450</p>
                        </div>
                        <div class="h-10 w-px bg-slate-200 hidden sm:block"></div>
                        <div>
                            <div class="flex items-center gap-2 text-blue-500 text-[9px] font-black uppercase mb-1"><i data-lucide="user-check" class="w-3 h-3"></i> Shade Tree</div>
                            <p id="cost-side" class="text-4xl font-black text-blue-600 italic tracking-tighter">$180</p>
                        </div>
                        <div class="h-10 w-px bg-slate-200 hidden sm:block"></div>
                        <div class="bg-green-600 p-6 rounded-[2rem] text-white shadow-xl">
                            <div class="flex items-center gap-2 text-green-200 text-[9px] font-black uppercase mb-1"><i data-lucide="trending-down" class="w-3 h-3"></i> DIY WIN</div>
                            <p class="text-4xl font-black italic tracking-tighter leading-none">$0.00</p>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                    <div class="lg:col-span-7 space-y-8" id="parts-list"></div>
                    <div class="lg:col-span-5 space-y-8" id="videos-list"></div>
                </div>
            </div>

            <!-- HISTORY VIEW -->
            <div id="view-history" class="view hidden space-y-8 animate-fade-in">
                <button onclick="showView('garage')" class="text-blue-600 font-black text-[10px] uppercase tracking-widest leading-none hover:translate-x-[-4px] transition-transform">← BACK TO GARAGE</button>
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-5">
                        <form id="log-form" onsubmit="saveLog(event)" class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-200 space-y-4">
                            <h3 class="font-black uppercase tracking-widest text-xs mb-6 text-blue-600">New Log Entry</h3>
                            <input id="log-service" placeholder="Service (e.g. Oil Change)" class="w-full p-4 bg-slate-100 rounded-2xl font-bold" required />
                            <div class="grid grid-cols-2 gap-4">
                                <input id="log-mileage" placeholder="Mileage" class="p-4 bg-slate-100 rounded-2xl font-bold" />
                                <input id="log-cost" placeholder="Cost ($)" class="p-4 bg-slate-100 rounded-2xl font-bold" />
                            </div>
                            <input id="log-date" type="date" class="w-full p-4 bg-slate-100 rounded-2xl font-bold" />
                            <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-xs shadow-lg">Save Service Log</button>
                        </form>
                    </div>
                    <div class="lg:col-span-7 space-y-4" id="logs-list"></div>
                </div>
            </div>

        </div>

        <!-- QUOTE MODAL -->
        <div id="quote-modal" class="fixed inset-0 z-[100] bg-blue-900/60 backdrop-blur-xl hidden flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-xl rounded-[4rem] shadow-2xl overflow-hidden">
                <div class="bg-blue-700 p-10 text-white flex justify-between items-center">
                    <div><h3 class="text-3xl font-black uppercase italic tracking-tighter">Service Quote</h3><p class="text-[10px] font-bold opacity-60 uppercase tracking-[0.3em] mt-2">WrenchPrice Pro Demo</p></div>
                    <button onclick="closeQuote()" class="bg-white/10 p-4 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <div class="p-12 space-y-6">
                    <div class="flex justify-between border-b pb-4"><span class="font-black text-slate-400 uppercase text-xs">Vehicle</span><span id="quote-veh" class="font-bold text-slate-900 uppercase"></span></div>
                    <div class="flex justify-between border-b pb-4 items-center"><span class="font-black text-slate-400 uppercase text-xs">Labor Estimate</span><div class="flex items-center gap-3"><span class="text-blue-600 font-black">$</span><input id="quote-labor-input" type="number" oninput="updateQuoteTotal()" class="w-32 p-3 bg-slate-50 border-2 border-blue-100 rounded-2xl text-right font-black text-2xl text-blue-600" /></div></div>
                    <div class="flex justify-between pt-10"><span class="font-black text-blue-700 uppercase text-2xl italic tracking-tighter">Total Estimate</span><span id="quote-total" class="text-5xl font-black text-slate-900 italic tracking-tighter">$0.00</span></div>
                    <button onclick="alert('Quote Copied!')" class="w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] uppercase tracking-widest text-xs flex items-center justify-center gap-3 hover:bg-black transition-all">Copy Invoice Text</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // APP STATE
        let garage = JSON.parse(localStorage.getItem('wp_garage')) || [];
        let logs = JSON.parse(localStorage.getItem('wp_logs')) || [];
        let selectedCar = null;
        let currentPartPrice = 0;

        // DATA HELPERS
        const MAKES = ["Toyota", "Ford", "Honda", "Chevrolet"];
        const MODELS = ["Camry", "F-150", "Civic", "Silverado"];
        const ENGINES = ["LE (Standard 4-Cyl)", "XLE (Premium V6)", "TRD Pro (Turbo V6)"];

        function init() {
            lucide.createIcons();
            renderGarage();
            updateMakes();
            document.getElementById('log-date').valueAsDate = new Date();
        }

        // NAVIGATION
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            
            document.getElementById('nav-garage').className = "w-full flex items-center gap-4 p-3 rounded-xl " + (viewId === 'garage' || viewId === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-white/5');
            document.getElementById('nav-search').className = "w-full flex items-center gap-4 p-3 rounded-xl " + (viewId === 'search' || viewId === 'results' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-white/5');
        }

        // GARAGE LOGIC
        function updateMakes() {
            const s = document.getElementById('select-make');
            s.innerHTML = '<option value="">Make</option>' + MAKES.map(m => `<option>${m}</option>`).join('');
        }
        function updateModels() {
            const s = document.getElementById('select-model');
            s.innerHTML = '<option value="">Model</option>' + MODELS.map(m => `<option>${m}</option>`).join('');
        }
        function updateEngines() {
            const s = document.getElementById('select-engine');
            s.innerHTML = '<option value="">Select Engine Size</option>' + ENGINES.map(e => `<option>${e}</option>`).join('');
        }

        function addVehicle() {
            const car = {
                id: Date.now(),
                year: document.getElementById('select-year').value,
                make: document.getElementById('select-make').value,
                model: document.getElementById('select-model').value,
                engine: document.getElementById('select-engine').value
            };
            if(!car.engine) return alert("Please finish all steps!");
            garage.push(car);
            localStorage.setItem('wp_garage', JSON.stringify(garage));
            renderGarage();
        }

        function renderGarage() {
            const list = document.getElementById('garage-list');
            list.innerHTML = garage.map(car => `
                <div class="bg-white p-8 rounded-[3rem] border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-6 hover:shadow-2xl transition-all group relative overflow-hidden">
                    <div class="absolute left-0 top-0 w-2 h-full bg-blue-600"></div>
                    <div class="flex items-center gap-6 flex-1 cursor-pointer" onclick="setActiveCar(${car.id})">
                        <div class="bg-blue-50 p-6 rounded-[2rem] text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all"><i data-lucide="car" class="w-10 h-10"></i></div>
                        <div>
                            <p class="font-black text-2xl tracking-tighter mb-1 uppercase leading-none">${car.year} ${car.make} ${car.model}</p>
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest opacity-70 italic flex items-center gap-2"><i data-lucide="activity" class="w-3 h-3"></i> ${car.engine}</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="showLogs(${car.id})" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2"><i data-lucide="history" class="w-4 h-4 text-slate-400"></i> Logs</button>
                        <button onclick="setActiveCar(${car.id})" class="bg-blue-600 text-white p-4 px-6 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-blue-700 shadow-lg italic">Find Parts</button>
                        <button onclick="deleteCar(${car.id})" class="p-4 text-slate-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteCar(id) {
            garage = garage.filter(c => c.id !== id);
            localStorage.setItem('wp_garage', JSON.stringify(garage));
            renderGarage();
        }

        function setActiveCar(id) {
            selectedCar = garage.find(c => c.id === id);
            document.getElementById('header-vehicle-name').innerText = `${selectedCar.year} ${selectedCar.make} ${selectedCar.model}`;
            document.getElementById('active-vehicle-indicator').classList.remove('hidden');
            document.getElementById('header-placeholder').classList.add('hidden');
            showView('search');
        }

        // SEARCH LOGIC
        function runSearch() {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            document.getElementById('result-query').innerText = query;
            document.getElementById('result-vehicle').innerText = `${selectedCar.year} ${selectedCar.make} ${selectedCar.model} | ${selectedCar.engine}`;
            
            // Simulation
            let shop = 320;
            if(query.toLowerCase().includes('brake')) shop = 380;
            if(query.toLowerCase().includes('oil')) shop = 65;
            
            document.getElementById('cost-shop').innerText = `$${shop}`;
            document.getElementById('cost-side').innerText = `$${Math.round(shop * 0.45)}`;
            
            renderResults(query, shop);
            showView('results');
        }

        function renderResults(q, shop) {
            const partsList = document.getElementById('parts-list');
            const videosList = document.getElementById('videos-list');
            
            const sideJobLabor = Math.round(shop * 0.45);
            const usedPrice = Math.round(shop * 0.25);

            partsList.innerHTML = `
                <div class="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden group">
                    <div class="flex items-center gap-3 mb-8"><i data-lucide="recycle" class="text-green-400 w-8 h-8"></i><h3 class="font-black text-2xl uppercase italic tracking-tighter">eBay Recycled</h3></div>
                    <div class="bg-white/5 border border-white/10 p-6 rounded-3xl flex justify-between items-center hover:bg-white/10 transition-all">
                        <div><p class="font-black text-lg uppercase">AutoRecycle_Plus</p><p class="text-[10px] text-slate-500 uppercase">Grade A Used Match</p></div>
                        <div class="flex items-center gap-6"><p class="text-3xl font-black text-green-400 italic">$${usedPrice}.00</p><button onclick="openQuote('${q} (Used)', ${usedPrice}, ${sideJobLabor})" class="bg-blue-600 p-4 rounded-2xl"><i data-lucide="file-text"></i></button></div>
                    </div>
                </div>
                <div class="bg-white p-10 rounded-[3.5rem] border border-slate-200 flex gap-10 hover:shadow-2xl transition-all relative">
                    <div class="w-48 h-48 bg-slate-100 rounded-[2rem] flex items-center justify-center"><i data-lucide="package" class="w-12 h-12 text-slate-300"></i></div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div><h4 class="font-black text-4xl leading-none uppercase italic mb-3">Premium ${q}</h4><span class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Bosch Performance</span></div>
                        <div class="flex items-end justify-between"><p class="text-6xl font-black italic tracking-tighter leading-none">$84.50</p><button onclick="openQuote('${q}', 84.50, ${sideJobLabor})" class="bg-blue-600 text-white font-black px-12 py-6 rounded-[2rem] text-xs uppercase tracking-widest">Buy Part</button></div>
                    </div>
                </div>
            `;

            videosList.innerHTML = `
                <div class="bg-white rounded-[3.5rem] overflow-hidden shadow-xl border border-slate-100">
                    <div class="aspect-video bg-slate-200 flex items-center justify-center cursor-pointer relative">
                        <i data-lucide="play-circle" class="w-20 h-20 text-red-600 z-10"></i>
                        <div class="absolute top-8 left-8 bg-red-600 text-[9px] font-black px-4 py-2 rounded-full text-white uppercase z-10">TRQ Auto</div>
                    </div>
                    <div class="p-10"><p class="text-slate-900 font-black text-2xl uppercase italic tracking-tighter leading-tight">How to Replace ${q} on ${selectedCar.make} ${selectedCar.model}</p></div>
                </div>
            `;
            lucide.createIcons();
        }

        // QUOTE GENERATOR
        function openQuote(name, price, labor) {
            currentPartPrice = price;
            document.getElementById('quote-veh').innerText = `${selectedCar.year} ${selectedCar.make} ${selectedCar.model}`;
            document.getElementById('quote-labor-input').value = labor;
            document.getElementById('quote-modal').classList.remove('hidden');
            updateQuoteTotal();
        }
        function closeQuote() { document.getElementById('quote-modal').classList.add('hidden'); }
        function updateQuoteTotal() {
            const labor = parseFloat(document.getElementById('quote-labor-input').value) || 0;
            document.getElementById('quote-total').innerText = `$${(currentPartPrice + labor).toFixed(2)}`;
        }

        // HISTORY LOGS
        function showLogs(id) {
            selectedCar = garage.find(c => c.id === id);
            renderLogs();
            showView('history');
        }
        function renderLogs() {
            const list = document.getElementById('logs-list');
            const carLogs = logs.filter(l => l.carId === selectedCar.id);
            list.innerHTML = carLogs.map(log => `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group flex justify-between items-center">
                    <div class="absolute left-0 top-0 w-1.5 h-full bg-blue-600"></div>
                    <div><h4 class="font-black text-xl uppercase italic tracking-tighter">${log.service}</h4><p class="text-[10px] font-black text-blue-500 uppercase">${log.date} • ${log.mileage} MI • $${log.cost}</p></div>
                    <button onclick="deleteLog(${log.id})" class="p-4 text-slate-200 hover:text-red-500 transition-all"><i data-lucide="trash-2"></i></button>
                </div>
            `).join('') || '<div class="p-12 text-center bg-white rounded-[3rem] border border-dashed border-slate-200 text-slate-400 font-bold uppercase text-xs">No records</div>';
            lucide.createIcons();
        }
        function saveLog(e) {
            e.preventDefault();
            const log = {
                id: Date.now(),
                carId: selectedCar.id,
                service: document.getElementById('log-service').value,
                mileage: document.getElementById('log-mileage').value,
                cost: document.getElementById('log-cost').value,
                date: document.getElementById('log-date').value
            };
            logs.push(log);
            localStorage.setItem('wp_logs', JSON.stringify(logs));
            document.getElementById('log-form').reset();
            renderLogs();
        }
        function deleteLog(id) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('wp_logs', JSON.stringify(logs));
            renderLogs();
        }

        window.onload = init;
    </script>
</body>
</html>
