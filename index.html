<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WrenchPrice | Part Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #f1c40f; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 900; letter-spacing: -1px; margin: 0; font-size: 38px; }
        header span { color: var(--brand); }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h2 { font-size: 14px; text-transform: uppercase; color: #888; margin-top: 0; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; margin-top: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 15px; background: var(--brand); color: #000; border: none; border-radius: 8px; font-weight: 900; text-transform: uppercase; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .btn-search:hover { background: #fff; }
        .store-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; cursor: pointer; font-size: 14px; color: white; display: block; text-align: center; text-decoration: none; }
        .loading-text { font-size: 12px; color: var(--brand); margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>WRENCH<span>PRICE</span></h1>
            <p style="color: #666; font-size: 14px;">Master Part Search & Repair Guide</p>
        </header>

        <div class="card">
            <h2>1. Select Vehicle</h2>
            <select id="makeSelect" onchange="fetchModels()">
                <option value="">Loading Makes...</option>
            </select>
            <select id="modelSelect" disabled>
                <option value="">Select a Make First</option>
            </select>
            <input type="number" id="yearInput" placeholder="Year (e.g. 2015)" min="1981" max="2027">
            <div id="loadingStatus" class="loading-text">Connecting to NHTSA Database...</div>
        </div>

        <div class="card">
            <h2>2. Find Part</h2>
            <input type="text" id="partInput" placeholder="e.g. Brake Pads">
            <button class="btn-search" onclick="startSearch()">Scour the Internet</button>
        </div>

        <div id="resultsArea"></div>
    </div>

    <script>
        // Initial Fetch of Makes
        fetch('https://vpic.nhtsa.dot.gov/api/vehicles/getallmakes?format=json')
            .then(res => res.json())
            .then(data => {
                const makeSelect = document.getElementById('makeSelect');
                makeSelect.innerHTML = '<option value="">Select Manufacturer</option>';
                const makes = data.Results.sort((a,b) => a.Make_Name.localeCompare(b.Make_Name));
                makes.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.Make_Name;
                    opt.textContent = m.Make_Name;
                    makeSelect.appendChild(opt);
                });
            }).catch(err => {
                alert("Database Error: Check your connection.");
            });

        function fetchModels() {
            const make = document.getElementById('makeSelect').value;
            const modelSelect = document.getElementById('modelSelect');
            const status = document.getElementById('loadingStatus');
            if(!make) return;
            modelSelect.disabled = true;
            status.style.display = 'block';
            fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/getmodelsformake/${make}?format=json`)
                .then(res => res.json())
                .then(data => {
                    modelSelect.innerHTML = '<option value="">Select Model</option>';
                    data.Results.sort((a,b) => a.Model_Name.localeCompare(b.Model_Name)).forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.Model_Name;
                        opt.textContent = m.Model_Name;
                        modelSelect.appendChild(opt);
                    });
                    modelSelect.disabled = false;
                    status.style.display = 'none';
                });
        }

        function startSearch() {
            console.log("Search started...");
            const year = document.getElementById('yearInput').value;
            const make = document.getElementById('makeSelect').value;
            const model = document.getElementById('modelSelect').value;
            const part = document.getElementById('partInput').value;

            if(!year || !make || !model || !part) {
                alert("Please fill in every box!");
                return;
            }

            const query = encodeURIComponent(`${year} ${make} ${model} ${part}`);
            const resultsArea = document.getElementById('resultsArea');

            // Building the UI
            let html = `
                <div class="card" style="border-top: 5px solid var(--brand);">
                    <h3 style="margin-top:0;">Searching for: ${year} ${make} ${model} ${part}</h3>
                    
                    <p style="font-size: 11px; color: #888; margin-top:20px; font-weight:bold;">LOCAL STORES (TODAY):</p>
                    <a href="https://www.autozone.com/searchresult?searchText=${query}" target="_blank" class="store-btn" style="background:#d90000;">AutoZone</a>
                    <a href="https://www.oreillyauto.com/search?q=${query}" target="_blank" class="store-btn" style="background:#00833e;">O'Reilly</a>
                    <a href="https://shop.advanceautoparts.com/web/SearchResults?searchTerm=${query}" target="_blank" class="store-btn" style="background:#ffcc00; color:black;">Advance Auto</a>

                    <p style="font-size: 11px; color: #888; margin-top:20px; font-weight:bold;">SHIPPING (SAVINGS):</p>
                    <a href="https://www.rockauto.com/en/catalog/${make},${year},${model},${encodeURIComponent(part)}" target="_blank" class="store-btn" style="background:#005399;">RockAuto</a>
                    <a href="https://www.ebay.com/sch/i.html?_nkw=${query}" target="_blank" class="store-btn" style="background:#e53238;">eBay Motors</a>

                    <p style="font-size: 11px; color: #888; margin-top:20px; font-weight:bold;">REPAIR GUIDES:</p>
                    <a href="https://www.youtube.com/results?search_query=how+to+replace+${query}" target="_blank" class="store-btn" style="background:#ff0000;">Watch How-To Video</a>
                </div>
            `;
            
            resultsArea.innerHTML = html;
            console.log("HTML Injected");
            
            // This forces the screen to slide down so you see the results
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
